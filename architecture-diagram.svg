<svg viewBox="0 0 1100 820" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2f8a52" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1100" height="820" fill="#f7f9fc" />

  <text x="550" y="32" text-anchor="middle" font-size="22" font-weight="700" fill="#1b2733">Active Directory Lab — VMware Architecture</text>
  <text x="550" y="54" text-anchor="middle" font-size="13" fill="#5b6b7a">Domain: lab.local · OS: Windows Server 2025 Datacenter · Platform: VMware Workstation Pro</text>

  <!-- Host container -->
  <rect x="20" y="72" width="1060" height="400" rx="14" fill="#eef4fb" stroke="#3a6ea5" stroke-width="1.6" stroke-dasharray="7 4" />
  <text x="40" y="98" font-size="15" font-weight="700" fill="#2c5b8a">&#x1F5A5;&#xFE0F;  VMware Workstation Pro — Local Host</text>

  <!-- LAN segment inner container -->
  <rect x="50" y="114" width="620" height="345" rx="10" fill="#e2edf9" stroke="#5b87b8" stroke-width="1.4" stroke-dasharray="5 3" />
  <text x="66" y="136" font-size="13" font-weight="700" fill="#2c5b8a">Isolated LAN Segment: AD-Lab</text>

  <!-- Host requirements box -->
  <rect x="70" y="150" width="290" height="72" rx="7" fill="#ffffff" stroke="#c0392b" stroke-width="1.5" />
  <text x="84" y="170" font-size="12" font-weight="700" fill="#c0392b">&#x26A0;&#xFE0F;  Host Requirements</text>
  <text x="84" y="189" font-size="10.5" fill="#3a3a3a">AMD-V (SVM) enabled in BIOS</text>
  <text x="84" y="205" font-size="10.5" fill="#3a3a3a">Hyper-V / VBS disabled at host</text>

  <!-- VM box -->
  <rect x="70" y="234" width="590" height="210" rx="8" fill="#ffffff" stroke="#2f8a52" stroke-width="1.6" />
  <rect x="70" y="234" width="590" height="34" rx="8" fill="#2f8a52" />
  <text x="85" y="257" font-size="14" font-weight="700" fill="#ffffff">&#x1F5A5;&#xFE0F;  Virtual Machine: DC01</text>

  <text x="85" y="285" font-size="11.5" font-weight="700" fill="#234">Role:</text>
  <text x="185" y="285" font-size="11.5" fill="#333">Active Directory Domain Controller</text>
  <text x="85" y="313" font-size="11.5" font-weight="700" fill="#234">OS:</text>
  <text x="185" y="313" font-size="11.5" fill="#333">Windows Server 2025 Datacenter</text>
  <text x="85" y="341" font-size="11.5" font-weight="700" fill="#234">Network:</text>
  <text x="185" y="341" font-size="11.5" fill="#333">Isolated LAN Segment (AD-Lab)</text>
  <text x="85" y="369" font-size="11.5" font-weight="700" fill="#234">Services:</text>
  <text x="185" y="369" font-size="11.5" fill="#333">AD DS · DNS · GPMC</text>
  <text x="85" y="397" font-size="11.5" font-weight="700" fill="#234">Access:</text>
  <text x="185" y="397" font-size="11.5" fill="#333">VMware Console / RDP</text>
  <text x="85" y="425" font-size="11.5" font-weight="700" fill="#234">Automation:</text>
  <text x="185" y="425" font-size="11.5" fill="#333">PowerShell (ADDSDeployment, AD scripts)</text>

  <!-- Right-side panels -->
  <rect x="700" y="114" width="340" height="82" rx="8" fill="#ffffff" stroke="#caa53d" stroke-width="1.5" />
  <text x="714" y="136" font-size="12.5" font-weight="700" fill="#caa53d">&#x1F4E6;  Hypervisor</text>
  <text x="714" y="156" font-size="11" fill="#333">VMware Workstation Pro 26H1</text>
  <text x="714" y="173" font-size="10.5" fill="#666">Free for personal use</text>

  <rect x="700" y="208" width="340" height="92" rx="8" fill="#ffffff" stroke="#7b4397" stroke-width="1.5" />
  <text x="714" y="230" font-size="12.5" font-weight="700" fill="#7b4397">&#x1F4BB;  Client VM</text>
  <text x="714" y="250" font-size="11" fill="#333">Windows 11 Enterprise (90-day eval)</text>
  <text x="714" y="267" font-size="10.5" fill="#666">→ joined to lab.local · OU=IT</text>
  <text x="714" y="283" font-size="10.5" fill="#666">Validates GPO enforcement</text>

  <rect x="700" y="312" width="340" height="84" rx="8" fill="#ffffff" stroke="#444444" stroke-width="1.5" />
  <text x="714" y="334" font-size="12.5" font-weight="700" fill="#333333">&#x1F419;  GitHub Repository</text>
  <text x="714" y="354" font-size="11" fill="#333">README + architecture diagram</text>
  <text x="714" y="371" font-size="10.5" fill="#666">Troubleshooting log included</text>

  <!-- AD container -->
  <rect x="20" y="484" width="1060" height="300" rx="14" fill="#eaf7ec" stroke="#2f8a52" stroke-width="1.6" stroke-dasharray="7 4" />
  <text x="40" y="510" font-size="15" font-weight="700" fill="#2f6b40">&#x1F5C2;&#xFE0F;  Active Directory — lab.local</text>

  <!-- DC node -->
  <rect x="460" y="524" width="180" height="42" rx="8" fill="#2f8a52" />
  <text x="550" y="550" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">DC=lab,DC=local</text>

  <!-- Connector: VM hosts DC -->
  <path d="M 365,444 Q 460,490 550,524" stroke="#2f8a52" stroke-width="1.8" stroke-dasharray="5 4" fill="none" marker-end="url(#arrowGreen)" />
  <text x="452" y="480" font-size="10.5" font-style="italic" fill="#2f6b40">Hosts AD DS</text>

  <!-- Tree lines -->
  <line x1="550" y1="566" x2="550" y2="590" stroke="#5a8f6a" stroke-width="1.6" />
  <line x1="155" y1="590" x2="905" y2="590" stroke="#5a8f6a" stroke-width="1.6" />
  <line x1="155" y1="590" x2="155" y2="612" stroke="#5a8f6a" stroke-width="1.6" />
  <line x1="405" y1="590" x2="405" y2="612" stroke="#5a8f6a" stroke-width="1.6" />
  <line x1="655" y1="590" x2="655" y2="612" stroke="#5a8f6a" stroke-width="1.6" />
  <line x1="905" y1="590" x2="905" y2="612" stroke="#5a8f6a" stroke-width="1.6" />

  <!-- OU=IT -->
  <rect x="40" y="612" width="230" height="150" rx="7" fill="#ffffff" stroke="#2f5fa8" stroke-width="1.5" />
  <rect x="40" y="612" width="230" height="30" rx="7" fill="#2f5fa8" />
  <text x="155" y="632" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">OU=IT</text>
  <text x="55" y="664" font-size="11" fill="#333">&#x1F464; marcus.reyes</text>
  <text x="55" y="688" font-size="11" fill="#333">→ IT_Admins</text>
  <text x="55" y="712" font-size="11" fill="#333">&#x1F4C4; GPO: IT Security Policy</text>
  <text x="55" y="734" font-size="10" font-style="italic" fill="#888">Screensaver lock enforced</text>

  <!-- OU=Finance -->
  <rect x="290" y="612" width="230" height="150" rx="7" fill="#ffffff" stroke="#d9a915" stroke-width="1.5" />
  <rect x="290" y="612" width="230" height="30" rx="7" fill="#d9a915" />
  <text x="405" y="632" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">OU=Finance</text>
  <text x="305" y="688" font-size="11" fill="#333">&#x1F464; priya.anand</text>
  <text x="305" y="714" font-size="11" fill="#333">→ Finance_Users</text>

  <!-- OU=HR -->
  <rect x="540" y="612" width="230" height="150" rx="7" fill="#ffffff" stroke="#c0392b" stroke-width="1.5" />
  <rect x="540" y="612" width="230" height="30" rx="7" fill="#c0392b" />
  <text x="655" y="632" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">OU=HR</text>
  <text x="555" y="688" font-size="11" fill="#333">&#x1F464; jordan.lee</text>
  <text x="555" y="714" font-size="11" fill="#333">→ HR_Users</text>

  <!-- OU=Sales -->
  <rect x="790" y="612" width="230" height="150" rx="7" fill="#ffffff" stroke="#d2691e" stroke-width="1.5" />
  <rect x="790" y="612" width="230" height="30" rx="7" fill="#d2691e" />
  <text x="905" y="632" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">OU=Sales</text>
  <text x="805" y="688" font-size="11" fill="#333">&#x1F464; natalie.osei</text>
  <text x="805" y="714" font-size="11" fill="#333">→ Sales_Users</text>

  <text x="550" y="805" text-anchor="middle" font-size="10" fill="#888">Validated end-to-end via client domain-join + GPO enforcement test</text>
</svg>
